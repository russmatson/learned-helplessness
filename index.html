<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Learned Helplessness</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Creepster&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#e8e8e8;font-family:'Special Elite',cursive;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
h1{font-family:'Creepster',cursive;font-size:2.8rem;color:#cc0000;text-shadow:0 0 20px #ff000066;text-align:center;padding:1rem;letter-spacing:2px}
.sub{font-size:.95rem;color:#888;margin-bottom:2rem;text-align:center;font-style:italic}
#gc{background:#111;border:2px solid #333;border-radius:12px;padding:2rem;max-width:680px;width:92vw;text-align:center;box-shadow:0 0 40px #00000088}
#st{font-size:1.3rem;line-height:1.7;margin-bottom:2rem;min-height:80px;color:#ddd}
.choices{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1.5rem}
.cb{background:#1a1a2e;border:2px solid #444;color:#ccc;padding:.75rem 1.2rem;font-family:'Special Elite',cursive;font-size:1rem;border-radius:8px;cursor:pointer;transition:all .2s}
.cb:hover{background:#2a2a4e;border-color:#cc0000;color:#fff;transform:scale(1.02)}
#ps{display:none;flex-direction:column;align-items:center;gap:1rem}
#pt{font-family:'Creepster',cursive;font-size:2rem;color:#cc0000;text-shadow:0 0 12px #ff0000aa}
#ptxt{font-size:1.05rem;color:#bbb;max-width:500px;line-height:1.6}
#ss{width:360px;max-width:90vw;overflow:visible}

/* Shark bounce */
#shark-group{animation:sb .5s ease-in-out infinite alternate;transform-origin:center}
@keyframes sb{from{transform:translateY(0) rotate(-2deg)}to{transform:translateY(-8px) rotate(2deg)}}

/* Poop drop animation */
#poop-drop{
  transform-origin: 50% 0%;
  animation: none;
}
.poop-falling{
  animation: poopFall 0.55s cubic-bezier(0.4,0,1,1) forwards !important;
}
@keyframes poopFall{
  0%  { transform: translateY(0px) scale(0.2) rotate(0deg); opacity:1; }
  60% { transform: translateY(62px) scale(1.3) rotate(-15deg); opacity:1; }
  80% { transform: translateY(72px) scale(1.1) rotate(-10deg); opacity:1; }
  100%{ transform: translateY(72px) scale(1.0) rotate(-8deg); opacity:1; }
}

/* Splat appears after drop */
#poop-splat{
  opacity:0;
}
.splat-appear{
  animation: splatIn 0.35s cubic-bezier(0.3,1.6,0.6,1) 0.55s forwards !important;
}
@keyframes splatIn{
  from{transform:scale(0) rotate(-20deg);opacity:0}
  to{transform:scale(1) rotate(0deg);opacity:1}
}

/* Person recoil */
#person-group{transform-origin:170px 195px}
.person-hit{
  animation: personHit 0.2s ease-out 0.55s forwards !important;
}
@keyframes personHit{
  0%  {transform:rotate(0deg) translateY(0)}
  40% {transform:rotate(15deg) translateY(4px)}
  100%{transform:rotate(8deg) translateY(2px)}
}

#nb{background:#cc0000;border:none;color:#fff;padding:.75rem 2rem;font-family:'Special Elite',cursive;font-size:1.1rem;border-radius:8px;cursor:pointer;margin-top:.5rem;transition:background .2s}
#nb:hover{background:#ff2222}
#scorebar{font-size:.9rem;color:#666;margin-top:1rem}
#gs{display:none;flex-direction:column;align-items:center;gap:1.2rem;text-align:center}
#gt{font-family:'Creepster',cursive;font-size:3rem;color:#cc0000;text-shadow:0 0 20px red}
#gm{color:#aaa;font-size:1.1rem;max-width:480px;line-height:1.7}
#rb{background:#222;border:2px solid #cc0000;color:#cc0000;padding:.75rem 2rem;font-family:'Special Elite',cursive;font-size:1.05rem;border-radius:8px;cursor:pointer;transition:all .2s}
#rb:hover{background:#cc0000;color:#fff}
#pr{color:#555;font-size:.85rem;margin-bottom:.5rem}
/* Splash overlay */
#splash{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;z-index:1000;cursor:pointer}
#splash h2{font-family:'Creepster',cursive;font-size:3.5rem;color:#cc0000;text-shadow:0 0 30px #ff000088;text-align:center;padding:0 1rem}
#splash p{color:#888;font-size:1rem;text-align:center;max-width:400px;line-height:1.6}
#splash-btn{background:#cc0000;border:none;color:#fff;padding:1rem 3rem;font-family:'Special Elite',cursive;font-size:1.3rem;border-radius:10px;cursor:pointer;animation:pulse 1.2s ease-in-out infinite alternate;letter-spacing:1px}
@keyframes pulse{from{transform:scale(1);box-shadow:0 0 10px #cc000066}to{transform:scale(1.05);box-shadow:0 0 30px #cc0000cc}}
#audio-bar{position:fixed;bottom:12px;right:12px;background:#1a1a1a;border:1px solid #444;border-radius:8px;padding:6px 12px;font-size:.75rem;color:#666;display:flex;align-items:center;gap:8px;z-index:999}
#audio-bar button{background:none;border:none;color:#888;cursor:pointer;font-size:.9rem;padding:2px 6px;border-radius:4px;transition:color .2s}
#audio-bar button:hover{color:#cc0000}
#yt-player{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;left:-9999px;top:-9999px}
</style>
</head>
<body>

<div id="splash" onclick="startSplash()">
  <h2>Learned Helplessness</h2>
  <p>Whatever you choose, it will be wrong.<br>The shark is already waiting.</p>
  <button id="splash-btn">&#9654; Begin Your Suffering</button>
</div>

<h1>Learned Helplessness</h1>
<p class="sub">Every choice is wrong. Resistance is futile. The shark awaits.</p>
<div id="gc">
<div id="scenario-screen">
<div id="pr"></div>
<div id="st"></div>
<div class="choices" id="cc"></div>
<div id="scorebar">Scenarios survived: <span id="score">0</span></div>
</div>

<div id="ps">
<div id="pt">WRONG.</div>

<svg id="ss" viewBox="0 0 360 290" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="360" height="290" fill="#1a0a0a"/>
  <circle cx="180" cy="60" r="45" fill="#cc000022"/>
  <circle cx="180" cy="58" r="32" fill="#2a1a1a" stroke="#cc0000" stroke-width="1.5"/>
  <circle cx="172" cy="52" r="22" fill="#1a0a0a"/>
  <!-- Ground -->
  <rect x="0" y="248" width="360" height="42" fill="#110800"/>
  <line x1="0" y1="248" x2="360" y2="248" stroke="#333" stroke-width="1.5"/>

  <!-- Stick person (with recoil animation group) -->
  <g id="person-group">
    <g transform="translate(170,195)">
      <line x1="0" y1="0" x2="0" y2="28" stroke="#e0c090" stroke-width="2.5"/>
      <circle cx="0" cy="-10" r="9" fill="#e0c090" stroke="#c8a070" stroke-width="1"/>
      <line x1="0" y1="8" x2="-18" y2="-2" stroke="#e0c090" stroke-width="2.5"/>
      <line x1="0" y1="8" x2="18" y2="-2" stroke="#e0c090" stroke-width="2.5"/>
      <line x1="0" y1="28" x2="-10" y2="44" stroke="#e0c090" stroke-width="2.5"/>
      <line x1="0" y1="28" x2="10" y2="44" stroke="#e0c090" stroke-width="2.5"/>
      <circle cx="-3" cy="-12" r="1.5" fill="#333"/>
      <circle cx="3" cy="-12" r="1.5" fill="#333"/>
      <path d="M-4 -5 Q0 -2 4 -5" stroke="#333" stroke-width="1.2" fill="none"/>
    </g>
  </g>

  <!-- Poop splat on ground (appears after drop) -->
  <g id="poop-splat" transform="translate(168,220)">
    <!-- Wide splat base -->
    <ellipse cx="0" cy="16" rx="32" ry="9" fill="#4a2e0e"/>
    <!-- Main pile -->
    <ellipse cx="0" cy="10" rx="24" ry="10" fill="#5c3a1e"/>
    <path d="M-12,10 Q-14,-6 -4,-12 Q4,-18 8,-6 Q14,-22 20,-8 Q26,-18 24,0 Q28,8 18,10 Z" fill="#6b4423"/>
    <!-- Swirl tower -->
    <path d="M4,-8 Q14,-24 10,-36 Q5,-44 0,-36 Q-5,-28 2,-22 Q10,-16 4,-8 Z" fill="#7a4f2a"/>
    <!-- Swirl top tip -->
    <path d="M2,-34 Q6,-42 3,-48 Q0,-44 2,-34 Z" fill="#8a5f3a"/>
    <!-- Stink lines -->
    <line x1="-6" y1="-38" x2="-10" y2="-56" stroke="#5c3a1e" stroke-width="2.5" stroke-linecap="round" opacity=".6"/>
    <line x1="6" y1="-40" x2="10" y2="-58" stroke="#5c3a1e" stroke-width="2.5" stroke-linecap="round" opacity=".6"/>
    <line x1="18" y1="-32" x2="24" y2="-48" stroke="#5c3a1e" stroke-width="2.5" stroke-linecap="round" opacity=".6"/>
    <!-- Flies -->
    <circle cx="-16" cy="-52" r="3" fill="#222"/>
    <circle cx="26" cy="-56" r="2.5" fill="#222"/>
    <circle cx="12" cy="-64" r="2.5" fill="#222"/>
    <!-- Splat drops around -->
    <ellipse cx="-28" cy="8" rx="7" ry="4" fill="#5c3a1e" transform="rotate(-25,-28,8)"/>
    <ellipse cx="30" cy="10" rx="6" ry="3.5" fill="#5c3a1e" transform="rotate(20,30,10)"/>
    <ellipse cx="-10" cy="26" rx="8" ry="4" fill="#4a2e0e"/>
    <ellipse cx="14" cy="27" rx="6" ry="3" fill="#4a2e0e"/>
    <!-- Impact stars -->
    <text x="-44" y="-10" font-size="16" fill="#cc0000" opacity=".8">&#10022;</text>
    <text x="36" y="-8" font-size="14" fill="#cc0000" opacity=".8">&#10022;</text>
  </g>

  <!-- Shark group (bouncing) -->
  <g id="shark-group" transform="translate(160,88)">
    <ellipse cx="0" cy="0" rx="72" ry="28" fill="#6a8a9a"/>
    <ellipse cx="4" cy="6" rx="55" ry="16" fill="#d8e8ec"/>
    <path d="M68 0 Q90 -8 88 0 Q90 8 68 0 Z" fill="#5a7a8a"/>
    <polygon points="72,-5 76,-14 80,-5" fill="white"/>
    <polygon points="78,-5 82,-13 86,-5" fill="white"/>
    <polygon points="65,-6 68,-15 72,-6" fill="white"/>
    <polygon points="72,5 75,13 79,5" fill="#eee"/>
    <polygon points="79,5 82,12 85,5" fill="#eee"/>
    <circle cx="60" cy="-7" r="5" fill="white"/>
    <circle cx="61" cy="-7" r="3" fill="#111"/>
    <circle cx="62" cy="-8" r="1" fill="white"/>
    <path d="M-10,-28 L10,-70 L30,-28 Z" fill="#5a7a8a"/>
    <path d="M-68,-15 L-95,-35 L-80,0 L-95,30 L-68,15 Z" fill="#5a7a8a"/>
    <path d="M10,20 L-5,52 L30,25 Z" fill="#6a8a9a"/>
    <path d="M10,-20 L-5,-50 L30,-22 Z" fill="#6a8a9a"/>
    <path d="M38,-18 Q32,-8 38,2" stroke="#4a6a7a" stroke-width="2" fill="none"/>
    <path d="M44,-20 Q38,-8 44,2" stroke="#4a6a7a" stroke-width="2" fill="none"/>
    <path d="M50,-20 Q44,-8 50,2" stroke="#4a6a7a" stroke-width="2" fill="none"/>
    <!-- Butt hole / source -->
    <ellipse cx="-68" cy="0" rx="5" ry="4" fill="#4a6a7a"/>

    <!-- Poop projectile (drops from butt) -->
    <!-- Positioned relative to shark: butt is at roughly (-68, 0) in shark coords,
         which is (160-68, 88) = (92, 88) in SVG coords.
         We want it to fall to the splat at ~(168,220).
         We'll use absolute SVG coords via a separate top-level group. -->
  </g>

  <!-- Poop drop projectile (absolute SVG coords, starts at shark butt ~92,88, falls to ~168,220) -->
  <g id="poop-drop" transform="translate(92,88)">
    <!-- Big chunky poop emoji shape -->
    <ellipse cx="0" cy="0" rx="14" ry="10" fill="#5c3a1e"/>
    <path d="M-8,0 Q-10,-12 -2,-16 Q4,-20 8,-10 Q12,-22 16,-8 Q20,-18 18,-2 Q22,6 14,8 Q6,14 -2,10 Z" fill="#6b4423"/>
    <path d="M2,-10 Q8,-22 5,-30 Q2,-36 -1,-28 Q-4,-20 2,-16 Q8,-12 2,-10 Z" fill="#7a4f2a"/>
    <!-- Eyes on poop -->
    <circle cx="-4" cy="-2" r="2.5" fill="#fff"/>
    <circle cx="-3.5" cy="-2" r="1.2" fill="#222"/>
    <circle cx="6" cy="-3" r="2.5" fill="#fff"/>
    <circle cx="6.5" cy="-3" r="1.2" fill="#222"/>
    <!-- Smile -->
    <path d="M-2 3 Q2 6 6 3" stroke="#333" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>

  <text x="248" y="116" font-size="9" fill="#cc000099" font-family="sans-serif">Great White Shark</text>
</svg>

<div id="ptxt"></div>
<button id="nb" onclick="nextS()">Face Your Next Doom</button>
</div>

<div id="gs">
<div id="gt">GAME OVER</div>
<div id="gm"></div>
<button id="rb" onclick="restart()">Try Again (You Will Fail)</button>
</div>
</div>

<div id="yt-player"></div>
<div id="audio-bar">
  <span>&#127925; Redd</span>
  <button id="mute-btn" title="Mute/Unmute" onclick="toggleMute()">&#128264;</button>
</div>

<script>
var ytPlayer, ytReady=false, ytMuted=false, shouldPlay=false;
function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player('yt-player',{
    height:'1',width:'1',videoId:'KYW2LYrSkA4',
    playerVars:{autoplay:0,loop:1,playlist:'KYW2LYrSkA4',controls:0,disablekb:1,fs:0,modestbranding:1,playsinline:1},
    events:{onReady:function(e){ytReady=true;e.target.setVolume(70);if(shouldPlay)e.target.playVideo();}}
  });
}
function startSplash(){
  document.getElementById('splash').style.display='none';
  shouldPlay=true;
  if(ytReady&&ytPlayer)ytPlayer.playVideo();
}
function toggleMute(){
  if(!ytPlayer)return;
  ytMuted=!ytMuted;
  ytMuted?ytPlayer.mute():ytPlayer.unMute();
  document.getElementById('mute-btn').textContent=ytMuted?'\uD83D\uDD07':'\uD83D\uDD08';
}
(function(){var s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);})();

const S=[
{t:"You pass a graveyard at midnight. A fresh grave beckons. Rob it or walk away with dignity?",c:[
{l:"Rob the grave \u2014 easy money!",p:"You robbed a grave. The ghost is furious AND you got caught on a Ring doorbell camera from 400 yards away. The Great White Shark was a pallbearer at that funeral."},
{l:"Walk away like a decent person",p:"You failed to rob the grave. Inside was a treasure map, the antidote to a rare disease, and your lost car keys. The Great White Shark watched you lose everything."}
]},
{t:"A baby is dangling from a third-floor window ledge. You are directly below. What do you do?",c:[
{l:"Heroically catch the baby!",p:"You caught the baby. It bit you. Hard. Turns out it was a 43-year-old man in a onesie. You are now in legal trouble. The Great White Shark is delighted."},
{l:"Step aside and call 911",p:"The baby landed perfectly fine on a trampoline you somehow didn't notice. Everyone saw you step aside. The Great White Shark narrated the news segment."}
]},
{t:"You're at a restaurant. The waiter recommends the salad for health, or the double bacon cheeseburger.",c:[
{l:"Order the salad \u2014 healthy living!",p:"The salad had 2,400 calories, three species of parasites, and a small unidentified key. Your bloodwork came back 'confusing.' The Great White Shark was the produce supplier."},
{l:"Order the double bacon cheeseburger",p:"Your doctor called at the exact moment you took your first bite. You are now on six medications and the subject of a documentary. The Great White Shark wrote the foreword."}
]},
{t:"An elderly woman needs help crossing the street. You have exactly enough time.",c:[
{l:"Help her across the street",p:"You helped her across. She was actually trying to go BACK the way she came. She has been crossing and re-crossing this intersection for 11 years and you ruined her streak. The Great White Shark was her official timekeeper."},
{l:"Mind your own business and keep walking",p:"She crossed fine \u2014 she has been doing it since 1963. But someone filmed you ignoring her and the video has 40 million views. The Great White Shark liked and shared it."}
]},
{t:"You find a wallet on the ground with $400 in cash and an ID inside.",c:[
{l:"Return it \u2014 it's the right thing to do",p:"The owner reported you to police for 'touching their wallet.' You spent Tuesday in a police station explaining your good deed. The Great White Shark testified against you."},
{l:"Keep the cash \u2014 finder's fee",p:"The cash was marked. It was a sting operation. It was also your own money \u2014 you dropped the wallet yourself and had amnesia about it. The Great White Shark set the whole thing up."}
]},
{t:"You have been invited to a friend's terrible improv show. It starts in an hour.",c:[
{l:"Attend and support them enthusiastically",p:"You attended. You were pulled on stage. You became the bit. Your face now appears in every improv school textbook as a cautionary tale. The Great White Shark was in the front row."},
{l:"Fake being sick and stay home",p:"You skipped it. They recorded it. It was objectively the greatest improv performance in human history. You are known forever as the person who missed it. The Great White Shark performed an encore."}
]},
{t:"A large spider is in your home. It is staring directly at you with all of its eyes.",c:[
{l:"Catch and release it outside \u2014 it's a living creature",p:"You released it outside. It came back inside. It brought friends. Entomologists now study your apartment professionally. The Great White Shark is their faculty advisor."},
{l:"Eliminate the spider with extreme prejudice",p:"It was a protected species. You are now in a national database. The spider's family filed a formal complaint. The Great White Shark notarized every document."}
]},
{t:"You have been running for 25 minutes. Your podcast just got to the really good part.",c:[
{l:"Push through for another 25 minutes \u2014 grind mentality",p:"You kept running. A runner's high caused you to quit your job via interpretive dance and sign a lease on a yacht. The Great White Shark was your HR department."},
{l:"Stop at 25 minutes \u2014 rest is important too",p:"A fitness influencer filmed your cool-down stretch for a video titled 'This Is Why You're Like This.' It has 11 million views. The Great White Shark wrote the caption."}
]},
{t:"A coworker's birthday. A card is going around the office. You must write something.",c:[
{l:"Write a heartfelt, genuine message",p:"They read it aloud at the party. You cried. Everyone watched you cry for seven uninterrupted minutes. It ended in a group hug you did not consent to. The Great White Shark catered the event."},
{l:"Write 'Happy Birthday!' and nothing else",p:"There is now a break room chart ranking card messages. You are at the bottom, directly below 'Best, Steve.' Nobody knows who Steve is. The Great White Shark made the chart."}
]},
{t:"A raccoon is raiding your neighbour's trash at 2am. It makes direct, sustained eye contact with you.",c:[
{l:"Chase it away \u2014 neighbourhood watch!",p:"The raccoon did not run. It stood its ground. You blinked first. The raccoon's confidence destroyed you psychologically. You refer to it now only as 'the incident.' The Great White Shark was its life coach."},
{l:"Respect the raccoon's hustle and go back inside",p:"You did nothing. The raccoon found your spare key (you did not know you had a spare key). It has been living in your attic for three weeks. The Great White Shark is the raccoon's landlord and your rent just went up."}
]}
];

let idx=0,sc=0,sh=[];
const shuf=a=>{let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};

function triggerPoopAnimation(){
  // Reset all animations
  const drop=document.getElementById('poop-drop');
  const splat=document.getElementById('poop-splat');
  const person=document.getElementById('person-group');

  // Force reflow to restart animations
  drop.classList.remove('poop-falling');
  splat.classList.remove('splat-appear');
  person.classList.remove('person-hit');
  void drop.offsetWidth;
  void splat.offsetWidth;
  void person.offsetWidth;

  // Hide splat initially, show drop
  drop.style.opacity='1';
  splat.style.opacity='0';

  // The poop-drop starts at (92,88) in SVG space = shark butt area
  // It needs to travel to roughly (168,220) = splat location
  // Delta: +76 in x, +132 in y — handled by the CSS keyframe translateY
  // We position the drop element to start right at the butt and animate downward+rightward
  drop.style.transform='translate(0,0)';

  // Trigger animations
  drop.classList.add('poop-falling');
  splat.classList.add('splat-appear');
  person.classList.add('person-hit');

  // After splat appears, hide the projectile
  setTimeout(()=>{ drop.style.opacity='0'; }, 700);
}

function restart(){sh=shuf(S);idx=0;sc=0;document.getElementById('score').textContent=0;showS();}

function showS(){
  ['gs','ps'].forEach(id=>{document.getElementById(id).style.display='none';});
  document.getElementById('scenario-screen').style.display='block';
  if(idx>=sh.length){gameOver();return;}
  const s=sh[idx];
  document.getElementById('pr').textContent='Scenario '+(idx+1)+' of '+sh.length;
  document.getElementById('st').textContent=s.t;
  const c=document.getElementById('cc');c.innerHTML='';
  shuf(s.c).forEach(ch=>{const b=document.createElement('button');b.className='cb';b.textContent=ch.l;b.onclick=()=>pick(ch.p);c.appendChild(b);});
}

function pick(p){
  sc++;document.getElementById('score').textContent=sc;
  document.getElementById('ptxt').textContent=p;
  document.getElementById('scenario-screen').style.display='none';
  document.getElementById('ps').style.display='flex';
  triggerPoopAnimation();
}

function nextS(){idx++;showS();}

function gameOver(){
  document.getElementById('scenario-screen').style.display='none';
  document.getElementById('ps').style.display='none';
  document.getElementById('gs').style.display='flex';
  document.getElementById('gm').textContent='You faced '+sc+' impossible choices and got every single one wrong. This was inevitable. The Great White Shark was proud of nothing you did. There was never a correct answer. There never will be. Thank you for playing Learned Helplessness.';
}

restart();
</script>
</body>
</html>
